<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#9333ea" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with smooth rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#grad1)" />
  
  <!-- Subtle glowing background rings for depth -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="32" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="16" />
  
  <!-- Event Ticket / Calendar Body -->
  <path d="M150 180 C150 150, 170 130, 200 130 L312 130 C342 130, 362 150, 362 180 L362 342 C362 372, 342 392, 312 392 L200 392 C170 392, 150 372, 150 342 Z" fill="#ffffff" filter="url(#shadow)" />
  
  <!-- Calendar Header -->
  <path d="M150 180 C150 150, 170 130, 200 130 L312 130 C342 130, 362 150, 362 180 L362 210 L150 210 Z" fill="url(#grad2)" />
  
  <!-- Calendar Binder Rings -->
  <rect x="190" y="100" width="28" height="60" rx="14" fill="#ffffff" filter="url(#shadow)" />
  <rect x="294" y="100" width="28" height="60" rx="14" fill="#ffffff" filter="url(#shadow)" />
  <!-- Ring Inner Holes -->
  <rect x="196" y="106" width="16" height="48" rx="8" fill="#94a3b8" />
  <rect x="300" y="106" width="16" height="48" rx="8" fill="#94a3b8" />
  
  <!-- Event Dates / Abstract Shapes -->
  <circle cx="206" cy="270" r="18" fill="#4f46e5" />
  <circle cx="306" cy="270" r="18" fill="#ec4899" />
  <circle cx="206" cy="330" r="18" fill="#38bdf8" />
  <path d="M 284 320 L 324 350 L 284 350 Z" fill="#fbbf24" />

  <!-- Magic Sparkles -->
  <path d="M90 120 Q110 140 130 120 Q110 100 90 120" fill="#ffffff" filter="url(#glow)" />
  <path d="M380 390 Q410 420 440 390 Q410 360 380 390" fill="#ffffff" filter="url(#glow)" />
  <path d="M410 130 Q425 145 440 130 Q425 115 410 130" fill="#ffffff" filter="url(#glow)" />
  
</svg>
